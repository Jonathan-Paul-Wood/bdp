<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World Panel</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="panel" aria-live="polite">
      <div class="tabContainer">
        <div class="tablinks active" value="main" title="Analysis Portal">Magnify</div>
        <div class="tablinks" value="saved" title="Saved Articles">Archive</div>
        <div class="tablinks" value="prompts" title="Manage Prompts">Bot head</div>
        <div class="tablinks" value="key" title="API Key">Key</div>
        <div class="tablinks" value="settings" title="Settings">Gear</div>
      </div>
      <div id="contentContainer">
        <div id="main" class="tabcontent" style="display: block">
          <h1 id="heading">hello world</h1>
          <form id="hello-form" autocomplete="off">
            <label class="field-label" for="hello-input">Message</label>
            <div class="field-row">
              <input id="hello-input" name="message" type="text" maxlength="80" required>
              <button type="submit">Submit</button>
            </div>
          </form>
          <div class="page-scraper">
            <button id="activate-scrape">Read Page Article</button>
          </div>
          <div id="extract-url"></div>
          <div id="extract-preview"></div>
        </div>
        <div id="saved" class="tabcontent" style="display: none">history</div>
        <div id="prompts" class="tabcontent" style="display: none">crud prompts</div>
        <div id="key" class="tabcontent" style="display: none">
          <h1>DeepInfra API Key Manage</h1>
          <input id="apiKey" placeholder="Add your api key here" value="" />
          <div>
            Don't yet have a key? Get one <a href="https://deepinfra.com/">here</a>
          </div>
        </div>
        <div id="settings" class="tabcontent" style="display: none">api et al</div>
      </div>
    </main>
    <script src="panel.js"></script>
    <script src="../scripts/key-manage.js"></script>
  </body>
</html>
