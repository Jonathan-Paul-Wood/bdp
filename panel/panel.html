<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World Panel</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="panel" aria-live="polite">
      <div class="tabContainer">
        <div class="tablinks active" value="main" title="Analysis Portal"><img src="../icons/magnify.svg" alt="Analysis Portal" /></div>
        <div class="tablinks" value="saved" title="Saved Articles"><img src="../icons/archive.svg" alt="Saved Articles" /></div>
        <div class="tablinks" value="prompts" title="Manage Prompts"><img src="../icons/bot.svg" alt="Manage Prompts" /></div>
        <div class="tablinks" value="key" title="API Key"><img src="../icons/key.svg" alt="API Key" /></div>
        <div class="tablinks" value="about" title="About"><img src="../icons/info.svg" alt="About" /></div>
      </div>
      <div id="contentContainer">
        <div id="main" class="tabcontent" style="display: block">
          <h1 id="heading">hello world</h1>
          <form id="hello-form" autocomplete="off">
            <label class="field-label" for="hello-input">Message</label>
            <div class="field-row">
              <input id="hello-input" name="message" type="text" maxlength="80" required>
              <button type="submit">Submit</button>
            </div>
          </form>
          <div class="page-analyzer">
            <button id="analyze-page">Read Page Article</button>
          </div>
          <div id="bias-results" style="display: none">
            <div class="split-panel">
              <div class="left-panel">
                <div id="assertives-row">Assertives: <span id="assertives-count"></span></div>
                <div id="factives-row">Factives: <span id="factives-count"></span></div>
                <div id="implicatives-row">Implicatives: <span id="implicatives-count"></span></div>
              </div>
              <div class="right-panel">
                <div id="hedges-row">Hedges: <span id="hedges-count"></span></div>
              </div>
            </div>
          </div>
        </div>
        <div id="saved" class="tabcontent" style="display: none">history</div>
        <div id="prompts" class="tabcontent" style="display: none">crud prompts</div>
        <div id="key" class="tabcontent" style="display: none">
          <h1>DeepInfra API Key Manage</h1>
          <input id="apiKey" placeholder="Add your api key here" value="" />
          <div>
            Don't yet have a key? Get one <a href="https://deepinfra.com/">here</a>
          </div>
        </div>
        <div id="about" class="tabcontent" style="display: none">
          <h1>Documentation</h1>
          <p>Full documentation is available at <a target="_blank" href="https://github.com/Jonathan-Paul-Wood/bdp">github</a></p>
          <p>Licensed under CC-BY-NC-SA-4.0</p>
          <img src="../icons/bdp-logo.png" alt="Bias Detection Panel" style="width: 100%; margin-top: 20px;" />
        </div>
      </div>
    </main>
    <script src="../scripts/key-manage.js"></script>
    <script src="../scripts/bias-constants.js"></script>
    <script src="panel.js"></script>
  </body>
</html>
