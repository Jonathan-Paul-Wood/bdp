<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello World Panel</title>
    <link rel="stylesheet" href="panel.css">
  </head>
  <body>
    <main class="panel" aria-live="polite">
      <div class="tab">
        <button class="tablinks" onclick="openTab(event, 'main')">Magnify glass</button>
        <button class="tablinks" onclick="openTab(event, 'saved')">Archive Box</button>
        <button class="tablinks" onclick="openTab(event, 'prompts')">Bot head</button>
        <button class="tablinks" onclick="openTab(event, 'settings')">Gear</button>
      </div>
      <div id="main" class="tabcontent active" style="display: block">
        <h1 id="heading">hello world</h1>
        <form id="hello-form" autocomplete="off">
          <label class="field-label" for="hello-input">Message</label>
          <div class="field-row">
            <input id="hello-input" name="message" type="text" maxlength="80" required>
            <button type="submit">Submit</button>
          </div>
        </form>
        <div class="page-scraper">
          <button id="activate-scrape" onclick="scrapeCurrentPage()">Read Page Article</button>
        </div>
        <div id="extract-url"></div>
        <div id="extract-preview"></div>
      </div>
      <div id="saved" class="tabcontent" style="display: none">history</div>
      <div id="prompts" class="tabcontent" style="display: none">crud prompts</div>
      <div id="settings" class="tabcontent" style="display: none">api et al</div>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
